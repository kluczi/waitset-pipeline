services:
    postgres:
        image: postgres:16-alpine
        container_name: pg_waitset
        environment:
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        ports:
            - "${POSTGRES_PORT}:5432"
        volumes:
            - pg_data:/var/lib/postgresql/data
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"
                ]
            interval: 3s
            timeout: 3s
            retries: 30

    dbt:
        build:
            context: ./waitset_pipeline
            dockerfile: Dockerfile
        container_name: dbt_waitset
        depends_on:
            postgres:
                condition: service_healthy
        environment:
            DBT_TARGET: ${DBT_TARGET}
            DB_HOST: postgres
            DB_PORT: 5432
            DB_NAME: ${POSTGRES_DB}
            DB_USER: ${POSTGRES_USER}
            DB_PASSWORD: ${POSTGRES_PASSWORD}
        volumes:
            - ./waitset_pipeline:/usr/app
            - ./waitset_pipeline/profiles.yml:/root/.dbt/profiles.yml:ro
        working_dir: /usr/app
        entrypoint:
            [
                "bash",
                "-lc"
            ]
        command:
            [
                "tail -f /dev/null"
            ]

    airflow-init:
        build:
            context: .
            dockerfile: ./airflow/Dockerfile
        environment:
            AIRFLOW__CORE__EXECUTOR: SequentialExecutor
            AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
            PYTHONPATH: /opt/airflow/project
            AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
            AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/project/airflow/dags
            _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_ADMIN_USERNAME}
            _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
            _AIRFLOW_WWW_USER_EMAIL: ${AIRFLOW_ADMIN_EMAIL}
        depends_on:
            postgres:
                condition: service_healthy
        volumes:
            - ./:/opt/airflow/project
        command: airflow db migrate

    airflow-webserver:
        build:
            context: .
            dockerfile: ./airflow/Dockerfile
        depends_on:
            airflow-init:
                condition: service_completed_successfully
        environment:
            AIRFLOW__CORE__EXECUTOR: SequentialExecutor
            AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
            AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
            PYTHONPATH: /opt/airflow/project
            AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/project/airflow/dags
        volumes:
            - ./:/opt/airflow/project
        ports:
            - "8080:8080"
        command: airflow webserver

    airflow-scheduler:
        build:
            context: .
            dockerfile: ./airflow/Dockerfile
        depends_on:
            airflow-init:
                condition: service_completed_successfully
        environment:
            AIRFLOW__CORE__EXECUTOR: SequentialExecutor
            AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
            PYTHONPATH: /opt/airflow/project
            AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
            AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/project/airflow/dags
        volumes:
            - ./:/opt/airflow/project
        command: airflow scheduler
    metabase:
        image: metabase/metabase:v0.53.4
        container_name: metabase
        depends_on:
            postgres:
                condition: service_healthy
        ports:
            - "127.0.0.1:3000:3000"
        environment:
            MB_DB_TYPE: postgres
            MB_DB_DBNAME: ${POSTGRES_DB}
            MB_DB_PORT: 5432
            MB_DB_USER: ${POSTGRES_USER}
            MB_DB_PASS: ${POSTGRES_PASSWORD}
            MB_DB_HOST: postgres
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "curl -f http://localhost:3000/api/health || exit 1"
                ]
            interval: 30s
            timeout: 10s
            retries: 5
            start_period: 120s
        restart: unless-stopped
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"
volumes:
    pg_data:
